<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册功能测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        .test-section h2 {
            margin-top: 0;
            color: #333;
        }
        .result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            background: #f5f5f5;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        #log {
            background: #000;
            color: #0f0;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>注册功能测试页面</h1>
    
    <div class="test-section">
        <h2>1. 测试Toast组件</h2>
        <button onclick="testToast()">测试Toast</button>
        <div id="toastResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. 测试Request对象</h2>
        <button onclick="testRequest()">测试Request</button>
        <div id="requestResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. 测试检查用户名API</h2>
        <input type="text" id="testUsername" placeholder="输入用户名" value="testuser123">
        <button onclick="checkUsername()">检查用户名</button>
        <div id="checkResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>4. 测试注册API</h2>
        <input type="text" id="regUsername" placeholder="用户名" value="testuser456"><br><br>
        <input type="email" id="regEmail" placeholder="邮箱（可选）"><br><br>
        <input type="password" id="regPassword" placeholder="密码" value="password123"><br><br>
        <button onclick="testRegister()">测试注册</button>
        <div id="registerResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>执行日志</h2>
        <div id="log"></div>
    </div>
    
    <!-- 引入必要的JS文件 -->
    <script src="/js/config.js"></script>
    <script src="/js/utils/request.js"></script>
    <script src="/js/utils/storage.js"></script>
    <script src="/js/utils/validator.js"></script>
    <script src="/js/components/toast.js"></script>
    <script src="/js/services/auth.js"></script>
    
    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${timestamp}] ${message}<br>`;
            console.log(message);
        }
        
        function testToast() {
            log('测试Toast组件...');
            try {
                if (typeof Toast === 'undefined') {
                    throw new Error('Toast对象未定义');
                }
                if (typeof Toast.show !== 'function') {
                    throw new Error('Toast.show方法不存在');
                }
                Toast.show('这是一个测试消息', 'success');
                document.getElementById('toastResult').className = 'result success';
                document.getElementById('toastResult').textContent = '✓ Toast组件正常工作';
                log('Toast组件测试通过', 'success');
            } catch (error) {
                document.getElementById('toastResult').className = 'result error';
                document.getElementById('toastResult').textContent = '✗ ' + error.message;
                log('Toast组件测试失败: ' + error.message, 'error');
            }
        }
        
        function testRequest() {
            log('测试Request对象...');
            try {
                if (typeof Request === 'undefined') {
                    throw new Error('Request对象未定义');
                }
                if (typeof Request.get !== 'function') {
                    throw new Error('Request.get方法不存在');
                }
                if (typeof Request.post !== 'function') {
                    throw new Error('Request.post方法不存在');
                }
                document.getElementById('requestResult').className = 'result success';
                document.getElementById('requestResult').textContent = '✓ Request对象正常工作';
                log('Request对象测试通过', 'success');
            } catch (error) {
                document.getElementById('requestResult').className = 'result error';
                document.getElementById('requestResult').textContent = '✗ ' + error.message;
                log('Request对象测试失败: ' + error.message, 'error');
            }
        }
        
        async function checkUsername() {
            const username = document.getElementById('testUsername').value.trim();
            log(`检查用户名: ${username}`);
            
            try {
                const response = await Request.get('/auth/check-username', { username });
                log('响应: ' + JSON.stringify(response));
                
                if (response.code === 200 && response.data) {
                    const available = response.data.available;
                    const message = response.data.message;
                    
                    document.getElementById('checkResult').className = 'result ' + (available ? 'success' : 'error');
                    document.getElementById('checkResult').textContent = 
                        (available ? '✓ ' : '✗ ') + message;
                    log('用户名检查结果: ' + message, available ? 'success' : 'info');
                } else {
                    throw new Error('响应格式错误');
                }
            } catch (error) {
                document.getElementById('checkResult').className = 'result error';
                document.getElementById('checkResult').textContent = '✗ 请求失败: ' + error.message;
                log('检查用户名失败: ' + error.message, 'error');
            }
        }
        
        async function testRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            
            log(`测试注册: username=${username}, email=${email}`);
            
            try {
                const response = await AuthService.register({
                    username,
                    password,
                    email: email || undefined
                });
                
                log('注册响应: ' + JSON.stringify(response));
                
                if (response.code === 200 || response.code === 201) {
                    document.getElementById('registerResult').className = 'result success';
                    document.getElementById('registerResult').textContent = 
                        '✓ 注册成功! 用户ID: ' + (response.data?.userId || 'N/A');
                    log('注册成功', 'success');
                } else {
                    document.getElementById('registerResult').className = 'result error';
                    document.getElementById('registerResult').textContent = 
                        '✗ 注册失败: ' + response.message;
                    log('注册失败: ' + response.message, 'error');
                }
            } catch (error) {
                document.getElementById('registerResult').className = 'result error';
                document.getElementById('registerResult').textContent = '✗ 请求失败: ' + error.message;
                log('注册请求失败: ' + error.message, 'error');
                console.error(error);
            }
        }
        
        // 页面加载完成后自动测试
        window.addEventListener('DOMContentLoaded', function() {
            log('页面加载完成，开始自动测试...');
            
            setTimeout(() => {
                testToast();
                testRequest();
            }, 500);
        });
    </script>
    
    <!-- Toast容器 -->
    <div class="toast-container" id="toastContainer"></div>
</body>
</html>
