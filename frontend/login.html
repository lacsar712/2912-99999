<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 数据管理系统</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 28px;
            color: white;
        }
        .login-header h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 16px;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px 12px 42px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .input-wrapper .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
        }
        .input-wrapper .toggle-password:hover {
            color: #667eea;
        }
        .field-error {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        .form-group.has-error .form-control {
            border-color: #e74c3c;
        }
        .form-group.has-error .field-error {
            display: block;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .login-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .login-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }
        /* 默认账号提示 */
        .demo-hint {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
        }
        .demo-hint .title {
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        .demo-hint .account {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
        }
        .demo-hint .account code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                        <path d="M2 12l10 5 10-5"></path>
                    </svg>
                </div>
                <h1>数据管理系统</h1>
                <p>智能生产线监控与调度平台</p>
            </div>
            <form id="loginForm">
                <div class="form-group" id="usernameGroup">
                    <label for="username">用户名</label>
                    <div class="input-wrapper">
                        <span class="icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </span>
                        <input type="text" class="form-control" id="username" name="username" 
                               placeholder="请输入用户名" required autocomplete="username">
                    </div>
                    <div class="field-error" id="usernameError"></div>
                </div>
                <div class="form-group" id="passwordGroup">
                    <label for="password">密码</label>
                    <div class="input-wrapper">
                        <span class="icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </span>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="请输入密码" required autocomplete="current-password">
                        <button type="button" class="toggle-password" id="togglePassword">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <div class="field-error" id="passwordError"></div>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">登录</button>
            </form>
            <div class="login-footer">
                <p>还没有账号？<a href="/register.html">立即注册</a></p>
            </div>
            <div class="demo-hint">
                <div class="title">演示账号</div>
                <div class="account">
                    <span>管理员：</span>
                    <span><code>admin</code> / <code>admin123</code></span>
                </div>
                <div class="account">
                    <span>操作员：</span>
                    <span><code>operator</code> / <code>operator123</code></span>
                </div>
            </div>
        </div>
    </div>

    <!-- 提示框容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/config.js"></script>
    <script src="/js/utils/request.js"></script>
    <script src="/js/utils/storage.js"></script>
    <script src="/js/utils/validator.js"></script>
    <script src="/js/components/toast.js"></script>
    <script src="/js/services/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 如果已登录，跳转到首页
            if (Storage.getToken()) {
                window.location.href = '/';
                return;
            }

            // 从URL获取预填充用户名
            const urlParams = new URLSearchParams(window.location.search);
            const prefillUsername = urlParams.get('username');
            if (prefillUsername) {
                document.getElementById('username').value = prefillUsername;
                document.getElementById('password').focus();
            }

            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const passwordInput = document.getElementById('password');
            const togglePasswordBtn = document.getElementById('togglePassword');

            // 密码显示/隐藏切换
            togglePasswordBtn.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                togglePasswordBtn.innerHTML = type === 'password' 
                    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>'
                    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
            });

            // 显示字段错误
            function showFieldError(field, message) {
                const group = document.getElementById(field + 'Group');
                const error = document.getElementById(field + 'Error');
                group.classList.add('has-error');
                if (error) error.textContent = message;
            }

            // 清除字段错误
            function clearFieldError(field) {
                const group = document.getElementById(field + 'Group');
                group.classList.remove('has-error');
            }

            // 表单提交
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;

                // 清除之前的错误
                clearFieldError('username');
                clearFieldError('password');

                let hasError = false;

                if (!username) {
                    showFieldError('username', '请输入用户名');
                    hasError = true;
                }

                if (!password) {
                    showFieldError('password', '请输入密码');
                    hasError = true;
                } else if (password.length < 6) {
                    showFieldError('password', '密码至少6位');
                    hasError = true;
                }

                if (hasError) return;

                // 显示加载状态
                loginBtn.disabled = true;
                loginBtn.textContent = '登录中...';

                try {
                    const response = await AuthService.login(username, password);

                    if (response.code === 200) {
                        Toast.show('登录成功', 'success');
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1000);
                    } else {
                        Toast.show(response.message || '登录失败', 'error');
                    }
                } catch (error) {
                    console.error('登录错误:', error);
                    Toast.show('网络错误，请稍后重试', 'error');
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录';
                }
            });
        });
    </script>
</body>
</html>
